[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    -p no:warnings
    --strict-markers

markers =
    slow: marks tests as slow (deselect with -m 'not slow')
    gpu: marks tests requiring a CUDA GPU
    dali: marks tests requiring nvidia-dali
    slurm: marks tests requiring a SLURM allocation

# Minimum version
minversion = 7.0
